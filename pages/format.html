<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>경기 방식 선택</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#0b1c30",
                        "surface-container-low": "#eff4ff",
                        "on-error": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "outline-variant": "#c3c6d7",
                        "on-primary-fixed-variant": "#003ea8",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#b4c5ff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#783200",
                        "inverse-primary": "#b4c5ff",
                        "primary": "#004ac6",
                        "surface-variant": "#d3e4fe",
                        "tertiary-fixed-dim": "#ffb690",
                        "secondary-fixed-dim": "#eec200",
                        "on-tertiary-container": "#ffece5",
                        "on-surface": "#0b1c30",
                        "on-tertiary-fixed": "#341100",
                        "tertiary-container": "#b54e00",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed": "#ffdbca",
                        "on-primary-fixed": "#00174b",
                        "on-error-container": "#93000a",
                        "primary-container": "#2563eb",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-fixed-variant": "#574500",
                        "surface-dim": "#cbdbf5",
                        "surface-tint": "#0053db",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#eeefff",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface-variant": "#434655",
                        "tertiary": "#8e3c00",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#213145",
                        "outline": "#737686",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#231b00",
                        "secondary-container": "#fed01b",
                        "surface": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "secondary": "#735c00",
                        "secondary-fixed": "#ffe083",
                        "on-secondary-container": "#6f5900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "20px",
                        "xs": "4px",
                        "lg": "40px",
                        "sm": "12px",
                        "touch-target": "48px",
                        "xl": "64px",
                        "md": "24px",
                        "gutter": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Quicksand"],
                        "body-lg": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-md": ["Quicksand"],
                        "button-text": ["Quicksand"],
                        "headline-lg-mobile": ["Quicksand"],
                        "headline-xl": ["Quicksand"],
                        "headline-lg": ["Quicksand"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "button-text": ["16px", { "lineHeight": "24px", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .format-card {
            transition: all 0.3s ease;
        }
        .format-card.selected {
            border-color: #004ac6;
            background-color: #eff4ff;
        }
        .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Top App Bar -->
<header class="bg-surface w-full top-0 sticky shadow-[0_4px_12px_rgba(0,74,198,0.1)] z-50">
<div class="flex justify-between items-center h-16 px-container-margin w-full max-w-7xl mx-auto">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center h-touch-target w-touch-target">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">경기 방식 선택</h1>
<div class="w-touch-target"></div> <!-- Spacer to center title -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow px-container-margin py-lg max-w-5xl mx-auto w-full">
<div class="text-center mb-xl">
<p class="font-body-lg text-body-lg text-on-surface-variant mb-base">대회에 적합한 경기 방식을 선택해주세요.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md md:gap-lg mb-xl">
<!-- League Card -->
<button class="format-card relative bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-lg text-left shadow-[0_4px_12px_rgba(0,74,198,0.05)] hover:border-primary-fixed hover:bg-surface-container-low transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-primary-fixed group" onclick="selectFormat('league', this)">
<div class="absolute top-md right-md bg-primary text-on-primary rounded-full p-1 check-icon">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="mb-md flex items-center justify-center w-20 h-20 bg-surface-container rounded-full group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[40px] text-primary group-hover:text-on-primary" style="font-variation-settings: 'FILL' 1;">view_comfy</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">리그전</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-md">참가한 모든 팀이 서로 한 번씩 경기를 치르는 방식입니다. 모든 참가자에게 고른 경기 기회를 제공합니다.</p>
<div class="inline-flex items-center gap-xs bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-md text-label-md">
<span class="material-symbols-outlined text-[16px]">sync</span>
                    풀리그 방식
                </div>
</button>
<!-- Tournament Card -->
<button class="format-card relative bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-lg text-left shadow-[0_4px_12px_rgba(0,74,198,0.05)] hover:border-primary-fixed hover:bg-surface-container-low transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-primary-fixed group" onclick="selectFormat('tournament', this)">
<div class="absolute top-md right-md bg-primary text-on-primary rounded-full p-1 check-icon">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="mb-md flex items-center justify-center w-20 h-20 bg-surface-container rounded-full group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[40px] text-primary group-hover:text-on-primary" style="font-variation-settings: 'FILL' 1;">account_tree</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">토너먼트</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-md">경기에서 진 팀은 탈락하고, 이긴 팀끼리 다음 라운드에서 겨루어 최종 우승자를 가리는 방식입니다.</p>
<div class="inline-flex items-center gap-xs bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-md text-label-md">
<span class="material-symbols-outlined text-[16px]">sports_martial_arts</span>
                    토너먼트 방식
                </div>
</button>
</div>
<div class="flex justify-center mt-auto pb-lg">
<button class="bg-primary text-on-primary font-button-text text-button-text h-touch-target px-xl rounded-full shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-surface-tint active:scale-95 transition-all duration-200 opacity-50 cursor-not-allowed w-full md:w-auto flex items-center justify-center" disabled="" id="confirmBtn">
                방식 선택 완료
            </button>
</div>
</main>
<script>
        let selectedFormatId = null;

        function selectFormat(formatId, element) {
            // Remove selected class from all cards
            document.querySelectorAll('.format-card').forEach(card => {
                card.classList.remove('selected', 'border-primary', 'bg-surface-container-low');
                card.classList.add('border-outline-variant');
            });

            // Add selected class to clicked card
            element.classList.add('selected', 'border-primary', 'bg-surface-container-low');
            element.classList.remove('border-outline-variant');

            selectedFormatId = formatId;

            // Enable confirm button
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // Add a subtle bounce animation to button to indicate it's ready
            confirmBtn.classList.add('animate-[bounce_0.5s_ease-in-out]');
            setTimeout(() => {
                confirmBtn.classList.remove('animate-[bounce_0.5s_ease-in-out]');
            }, 500);
        }
    </script>
</body></html>
