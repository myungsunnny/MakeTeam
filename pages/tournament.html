<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>토너먼트 대진표 - 키네틱 러닝</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../js/tailwind.config.js"></script>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    :root {
      --apple-radius: 20px;
      --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
      --apple-shadow-hover: 0 12px 40px rgba(0,0,0,0.08);
    }
    .round-column {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 2.5rem;
      min-width: 220px;
    }
    .match-box {
      position: relative;
      width: 200px;
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 10;
    }
    .match-box:hover {
      transform: scale(1.02);
    }
    .match-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: var(--apple-radius);
      overflow: hidden;
      box-shadow: var(--apple-shadow);
    }
    .team-node {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;
      height: 48px;
    }
    .team-node:hover {
      background-color: rgba(0, 0, 0, 0.02);
    }
    .team-node.winner {
      background-color: rgba(var(--md-sys-color-primary-rgb), 0.08);
      font-weight: 700;
      color: var(--md-sys-color-primary);
    }
    .team-node.loser {
      opacity: 0.4;
      filter: grayscale(1);
    }
    
    /* Connectors */
    .connector-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .connector-line {
      fill: none;
      stroke: #E5E7EB;
      stroke-width: 2;
      stroke-linecap: round;
    }
    .connector-line.active {
      stroke: var(--md-sys-color-primary);
      stroke-width: 3;
    }

    .trophy-glow {
      animation: trophyGlow 3s infinite alternate;
    }
    @keyframes trophyGlow {
      from { filter: drop-shadow(0 0 5px rgba(254, 208, 27, 0.2)); }
      to { filter: drop-shadow(0 0 20px rgba(254, 208, 27, 0.6)); }
    }

    /* Premium Button Style */
    .premium-btn {
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      border-radius: 14px;
    }
    .premium-btn:active {
      transform: scale(0.96);
    }

    /* Glassmorphism Tabs */
    .glass-tabs {
      background: rgba(0, 0, 0, 0.03);
      padding: 4px;
      border-radius: 16px;
    }
    .glass-tabs button {
      border-radius: 12px;
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md pb-16">

  <!-- 상단 앱바 -->
  <header class="bg-surface w-full top-0 sticky shadow-[0_4px_12px_rgba(0,74,198,0.1)] z-40">
    <div class="flex justify-between items-center h-16 px-container-margin w-full max-w-7xl mx-auto">
      <button onclick="navigate('dashboard')"
        class="flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-surface-container-low transition-colors active:scale-95 text-on-surface-variant">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <h1 class="font-headline-md text-headline-md text-primary font-bold">4학년 호랑이반</h1>
      <button class="flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-surface-container-low transition-colors">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDu4RrmCe73gG72ZaIR-_49CumxLA5nHrVpb6fxeOzcU6fn_fgBBQXwD9ySQmxju3do8zUVABeQVq1hbjtM70nsFvWvh22acTnDqaunbAmQN6lOHQCLaDY3eelUH0iLvhcOvZb5RG2OtN-prAJiJeGVHnXuR1MZHIRJLKEUnmlhx8O2PzALkSEIuinpAERjQ6gg8prQ-rVixGo5ZoUscL6YCz5JSakqYrDGPbgsCwahmqn7qObG_PngdueCkJciukM-BjkwOWAMp30"
          alt="프로필" class="w-10 h-10 rounded-full object-cover border-2 border-surface-container-high"/>
      </button>
    </div>
  </header>

  <!-- 메인 -->
  <main class="flex-grow px-container-margin py-lg max-w-7xl mx-auto w-full">

    <div class="mb-lg lg:mb-xl flex flex-col lg:flex-row lg:items-end lg:justify-between gap-md">
      <div>
        <h2 class="font-headline-lg-mobile lg:font-headline-lg text-headline-lg-mobile lg:text-headline-lg text-on-surface font-bold" id="pageTitle">경기 방식 선택</h2>
        <p class="font-body-md lg:font-body-lg text-body-md lg:text-body-lg text-on-surface-variant mt-xs" id="pageSubTitle">원하는 경기 방식을 선택하고 진행하세요.</p>
      </div>
      
      <!-- 데스크탑용 추가 필터나 컨트롤이 들어갈 수 있는 공간 -->
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg items-start">
      
      <!-- 왼쪽 설정 패널 (데스크탑에서 4컬럼) -->
      <aside class="lg:col-span-4 flex flex-col gap-md">
        <!-- 1단계: 경기 방식 및 설정 탭 -->
        <div class="flex flex-col gap-md">
          <div class="grid grid-cols-3 gap-sm glass-tabs">
            <button id="format-tournament" onclick="setFormat('tournament')"
              class="h-11 font-label-md text-label-md transition-all duration-300 premium-btn">
              토너먼트
            </button>
            <button id="format-league" onclick="setFormat('league')"
              class="h-11 font-label-md text-label-md transition-all duration-300 premium-btn">
              리그전
            </button>
            <button id="format-ladder" onclick="setFormat('ladder')"
              class="h-11 font-label-md text-label-md transition-all duration-300 premium-btn">
              사다리
            </button>
          </div>

          <div id="league-config" class="hidden animate-in slide-in-from-top-4 duration-300">
            <div class="bg-surface-container-lowest rounded-[20px] p-md border border-outline-variant shadow-sm">
              <label class="font-label-md text-on-surface-variant mb-sm block">진행할 총 경기 수 (팀당)</label>
              <div class="flex items-center gap-md">
                <input type="range" id="leagueMatchCount" min="1" max="10" value="1" 
                  class="flex-1 accent-primary" oninput="updateLeagueMatchText(this.value)">
                <span class="font-headline-sm text-primary font-bold w-12 text-center" id="matchCountDisplay">1회</span>
              </div>
            </div>
          </div>

          <div id="tournament-config" class="hidden animate-in slide-in-from-top-4 duration-300">
            <div class="flex flex-col gap-sm">
              <button onclick="shuffleTournament()" class="w-full h-12 bg-surface-container-lowest text-primary border border-primary/20 rounded-[16px] font-button-text flex items-center justify-center gap-sm hover:bg-primary/5 active:scale-95 transition-all shadow-sm">
                <span class="material-symbols-outlined text-[20px]">shuffle</span>
                대진표 무작위 섞기
              </button>
              <div class="flex items-center justify-between px-md py-sm bg-surface-container-lowest rounded-[16px] border border-outline-variant shadow-sm">
                <span class="font-label-md text-on-surface">패자부활전 활성화</span>
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" id="doubleElimToggle" class="sr-only peer" onchange="toggleDoubleElim(this.checked)">
                  <div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                </label>
              </div>
            </div>
          </div>
          
          <div id="ladder-config" class="hidden animate-in slide-in-from-top-4 duration-300">
            <button onclick="generateLadder()" class="w-full h-12 bg-primary text-on-primary rounded-[16px] font-button-text flex items-center justify-center gap-sm hover:opacity-95 active:scale-95 transition-all shadow-md shadow-primary/20">
              <span class="material-symbols-outlined text-[20px]">account_tree</span>
              사다리 다시 생성하기
            </button>
          </div>
        </div>

        <!-- 2단계: 뷰 전환 -->
        <div id="view-tabs" class="grid grid-cols-2 gap-sm glass-tabs">
          <button id="tab-bracket" onclick="switchTab('bracket')"
            class="h-11 font-label-md text-label-md transition-all duration-300 premium-btn">
            대진표
          </button>
          <button id="tab-ranking" onclick="switchTab('ranking')"
            class="h-11 font-label-md text-label-md transition-all duration-300 premium-btn">
            순위표
          </button>
        </div>
      </aside>

      <!-- 오른쪽 메인 콘텐츠 (데스크탑에서 8컬럼) -->
      <section class="lg:col-span-8">
        <!-- 대진표 뷰 -->
        <div id="view-bracket" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div id="tournament-graphic" class="hidden overflow-x-auto pb-lg mb-lg relative rounded-2xl bg-black/[0.02] border border-black/[0.03]">
            <svg id="bracketConnectors" class="connector-container"></svg>
            <div class="flex items-start min-w-max p-lg gap-16" id="bracketTree">
              <!-- JS로 동적 트리 생성 -->
            </div>
          </div>
          <div id="bracketContent" class="grid grid-cols-1 md:grid-cols-2 gap-md">
            <!-- JS로 생성 -->
          </div>
        </div>

        <!-- 순위표 뷰 -->
        <div id="view-ranking" class="hidden">
          <div id="rankingContent" class="bg-surface-container-lowest rounded-[24px] border border-outline-variant overflow-hidden shadow-sm">
            <!-- JS로 생성 -->
          </div>
        </div>
      </section>

    </div>

  </main>

  <div id="teamModal" class="fixed inset-0 z-50 flex items-center justify-center p-md bg-black/40 hidden" onclick="closeTeamModal()">
    <div class="bg-surface-container-lowest w-full max-w-sm rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-200" onclick="event.stopPropagation()">
      <div id="modalHeader" class="px-lg py-md flex justify-between items-center">
        <h3 id="modalTeamName" class="font-headline-md text-headline-md font-bold">팀 정보</h3>
        <button onclick="closeTeamModal()" class="w-8 h-8 rounded-full hover:bg-black/5 flex items-center justify-center">
          <span class="material-symbols-outlined text-on-surface-variant">close</span>
        </button>
      </div>
      <div id="modalMemberList" class="px-lg pb-lg flex flex-col gap-sm"></div>
    </div>
  </div>

  <div id="bottom-nav-container"></div>

  <script src="../js/app.js"></script>
  <script>
    let currentFormat = AppState.matchFormat || 'tournament';
    let leagueMatchCount = 1;
    let isDoubleElim = AppState.isDoubleElim || false;

    function setFormat(format) {
      currentFormat = format;
      AppState.save('matchFormat', format);
      document.getElementById('league-config').classList.toggle('hidden', format !== 'league');
      document.getElementById('tournament-config').classList.toggle('hidden', format !== 'tournament');
      document.getElementById('ladder-config').classList.toggle('hidden', format !== 'ladder');
      
      const activeClass = ['bg-white', 'text-primary', 'shadow-sm'];
      const inactiveClass = ['text-on-surface-variant', 'hover:bg-black/5'];
      ['tournament', 'league', 'ladder'].forEach(f => {
        const btn = document.getElementById(`format-${f}`);
        if (!btn) return;
        if (f === format) { btn.classList.add(...activeClass); btn.classList.remove(...inactiveClass); }
        else { btn.classList.remove(...activeClass); btn.classList.add(...inactiveClass); }
      });
      
      const titles = { 'tournament': '토너먼트 경기', 'league': '리그전 경기', 'ladder': '사다리 타기' };
      document.getElementById('pageTitle').textContent = titles[format] || '경기 방식';
      
      renderBracket();
    }

    function toggleDoubleElim(checked) {
      isDoubleElim = checked;
      AppState.save('isDoubleElim', checked);
      renderBracket();
    }

    function shuffleTournament() {
      if (!confirm('대진표를 무작위로 다시 섞으시겠습니까? 기존 결과가 초기화됩니다.')) return;
      const teams = [...AppState.teams].sort(() => Math.random() - 0.5);
      AppState.save('teams', teams);
      AppState.save('matchResults', []);
      renderBracket();
    }

    function generateLadder() {
      const teams = [...AppState.teams].sort(() => Math.random() - 0.5);
      const ladderMatches = [];
      for(let i=0; i<teams.length; i+=2) {
        if(teams[i+1]) {
          ladderMatches.push({ id: `ladder-${i}`, team1: teams[i], team2: teams[i+1], label: '사다리 매칭' });
        }
      }
      
      const container = document.getElementById('bracketContent');
      if (ladderMatches.length === 0) {
        container.innerHTML = `<div class="p-lg text-center opacity-50">매칭 가능한 팀이 부족합니다.</div>`;
      } else {
        container.innerHTML = ladderMatches.map((m, idx) => renderMatchCard(m, idx)).join('');
      }
      document.getElementById('tournament-graphic').classList.add('hidden');
    }

    function updateLeagueMatchText(val) {
      leagueMatchCount = val;
      document.getElementById('matchCountDisplay').textContent = `${val}회`;
      renderBracket();
    }

    function switchTab(tab) {
      const isBracket = tab === 'bracket';
      document.getElementById('view-bracket').classList.toggle('hidden', !isBracket);
      document.getElementById('view-ranking').classList.toggle('hidden', isBracket);
      const activeClass = ['bg-white', 'text-primary', 'shadow-sm'];
      const inactiveClass = ['text-on-surface-variant', 'hover:bg-black/5'];
      ['bracket', 'ranking'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (t === tab) { btn.classList.add(...activeClass); btn.classList.remove(...inactiveClass); }
        else { btn.classList.remove(...activeClass); btn.classList.add(...inactiveClass); }
      });
      if (isBracket) renderBracket();
      else renderRanking();
    }

    function getTournamentStructure(teams) {
      const count = teams.length;
      if (count < 2) return [];
      const size = Math.pow(2, Math.ceil(Math.log2(count)));
      const results = AppState.matchResults || [];
      
      let currentRound = [];
      for (let i = 0; i < size; i += 2) {
        const t1 = teams[i] || null;
        const t2 = teams[i+1] || null;
        const matchId = `t-r1-m${i/2}`;
        const res = results.find(r => r.id === matchId);
        let winner = null;
        if (t1 && !t2) winner = t1;
        else if (res) winner = (res.result === 'win1' ? t1 : t2);
        currentRound.push({ id: matchId, team1: t1, team2: t2, winner, label: '1라운드' });
      }

      const rounds = [currentRound];
      while (currentRound.length > 1) {
        const nextRound = [];
        for (let i = 0; i < currentRound.length; i += 2) {
          const m1 = currentRound[i];
          const m2 = currentRound[i+1];
          const t1 = m1 ? m1.winner : null;
          const t2 = m2 ? m2.winner : null;
          const matchId = `t-r${rounds.length + 1}-m${i/2}`;
          const res = results.find(r => r.id === matchId);
          let winner = null;
          if (t1 && !t2 && m1.winner) winner = t1;
          else if (res) winner = (res.result === 'win1' ? t1 : t2);
          
          let label = `${rounds.length + 1}라운드`;
          if (currentRound.length / 2 === 1) label = '결승';
          else if (currentRound.length / 2 === 2) label = '준결승';
          
          nextRound.push({ id: matchId, team1: t1, team2: t2, winner, label });
        }
        rounds.push(nextRound);
        currentRound = nextRound;
      }
      return rounds;
    }

    function renderBracket() {
      const teams = AppState.teams;
      const container = document.getElementById('bracketContent');
      const graphicView = document.getElementById('tournament-graphic');
      if (!teams || teams.length === 0) {
        container.innerHTML = `<div class="p-lg text-center opacity-50">배정된 팀이 없습니다.</div>`;
        return;
      }
      
      if (currentFormat === 'tournament') {
        graphicView.classList.remove('hidden');
        const rounds = getTournamentStructure(teams);
        renderTournamentGraphic(rounds);
        const pending = rounds.flat().filter(m => m.team1 && m.team2);
        container.innerHTML = pending.length ? pending.map((m, idx) => renderMatchCard(m, idx)).join('') : '<div class="text-center p-md opacity-50">진행 가능한 경기가 없습니다.</div>';
      } else if (currentFormat === 'league') {
        graphicView.classList.add('hidden');
        let matches = [];
        for (let i = 0; i < teams.length; i++) {
          for (let j = i + 1; j < teams.length; j++) {
            for (let r = 0; r < leagueMatchCount; r++) {
              matches.push({ id: `league-${i}-${j}-${r}`, team1: teams[i], team2: teams[j], label: '리그전' });
            }
          }
        }
        container.innerHTML = matches.map((m, idx) => renderMatchCard(m, idx)).join('');
      } else {
        generateLadder();
      }
    }

    function renderMatchCard(match, idx) {
      const results = AppState.matchResults || [];
      const res = results.find(r => r.id === match.id);
      const resType = res ? res.result : null;
      return `
        <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm animate-in fade-in slide-in-from-bottom-2 duration-300" style="animation-delay: ${idx * 50}ms">
          <div class="bg-surface-container px-md py-sm flex justify-between items-center">
            <span class="font-label-md text-on-surface-variant text-[10px] uppercase font-bold">${match.label}</span>
            ${resType ? '<span class="text-primary font-bold text-[10px] bg-primary/10 px-2 py-0.5 rounded uppercase">Recorded</span>' : ''}
          </div>
          <div class="p-md flex flex-col gap-md">
            <div class="flex items-center justify-between gap-md">
              <div onclick="showTeamDetails('${match.team1.name}')" class="flex items-center gap-sm flex-1 cursor-pointer hover:bg-black/5 p-1 rounded-lg transition-colors overflow-hidden">
                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center font-bold text-on-primary text-xs flex-shrink-0">${match.team1.name.charAt(0)}</div>
                <span class="font-bold truncate text-sm">${match.team1.name}</span>
              </div>
              <span class="text-outline-variant font-bold italic text-xs">VS</span>
              <div onclick="showTeamDetails('${match.team2.name}')" class="flex items-center justify-end gap-sm flex-1 text-right cursor-pointer hover:bg-black/5 p-1 rounded-lg transition-colors overflow-hidden">
                <span class="font-bold truncate text-sm">${match.team2.name}</span>
                <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center font-bold text-on-secondary-container text-xs flex-shrink-0">${match.team2.name.charAt(0)}</div>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-sm">
              <button onclick="setResult('${match.id}', '${match.team1.name}', '${match.team2.name}', 'win1')" class="h-10 rounded-xl text-xs font-bold transition-all ${resType === 'win1' ? 'bg-primary text-on-primary shadow-md' : 'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}">${match.team1.name.length > 4 ? '승' : match.team1.name + ' 승'}</button>
              <button onclick="setResult('${match.id}', '${match.team1.name}', '${match.team2.name}', 'draw')" class="h-10 rounded-xl text-xs font-bold transition-all ${resType === 'draw' ? 'bg-primary text-on-primary shadow-md' : 'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}">무승부</button>
              <button onclick="setResult('${match.id}', '${match.team1.name}', '${match.team2.name}', 'win2')" class="h-10 rounded-xl text-xs font-bold transition-all ${resType === 'win2' ? 'bg-primary text-on-primary shadow-md' : 'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}">${match.team2.name.length > 4 ? '승' : match.team2.name + ' 승'}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderTournamentGraphic(rounds) {
      const treeContainer = document.getElementById('bracketTree');
      const svgContainer = document.getElementById('bracketConnectors');
      treeContainer.innerHTML = '';
      svgContainer.innerHTML = '';
      
      rounds.forEach((round, rIdx) => {
        const col = document.createElement('div');
        col.className = 'round-column';
        col.id = `round-${rIdx}`;
        
        const label = document.createElement('div');
        label.className = 'text-center font-bold text-primary text-xs uppercase tracking-widest mb-4';
        label.textContent = round[0]?.label || `Round ${rIdx + 1}`;
        col.appendChild(label);

        round.forEach((match, mIdx) => {
          const mBox = document.createElement('div');
          mBox.className = 'match-box';
          mBox.id = `match-${rIdx}-${mIdx}`;
          
          const isWinner1 = match.winner && match.team1 && match.winner.name === match.team1.name;
          const isWinner2 = match.winner && match.team2 && match.winner.name === match.team2.name;
          const hasLoser = match.winner && (match.team1 && match.team2);

          mBox.innerHTML = `
            <div class="match-card">
              ${renderNode(match.team1, isWinner1, hasLoser && !isWinner1, match, 'win1')}
              <div class="h-px bg-outline-variant/30"></div>
              ${renderNode(match.team2, isWinner2, hasLoser && !isWinner2, match, 'win2')}
            </div>
          `;
          col.appendChild(mBox);
        });
        treeContainer.appendChild(col);
      });

      // 우승컵 추가
      const champCol = document.createElement('div');
      champCol.className = 'round-column items-center justify-center';
      const lastRound = rounds[rounds.length - 1][0];
      const champion = lastRound.winner;
      champCol.innerHTML = `
        <div class="flex flex-col items-center gap-4">
          <div class="w-24 h-24 rounded-full bg-primary/10 border-4 ${champion ? 'border-primary trophy-glow' : 'border-outline-variant border-dashed'} flex items-center justify-center relative">
            <span class="material-symbols-outlined text-5xl ${champion ? 'text-primary animate-bounce' : 'text-outline-variant'}">emoji_events</span>
            ${champion ? `<div class="absolute -bottom-12 whitespace-nowrap bg-primary text-on-primary px-4 py-1.5 rounded-full font-bold text-sm shadow-lg animate-in zoom-in">${champion.name} 우승!</div>` : ''}
          </div>
        </div>
      `;
      treeContainer.appendChild(champCol);

      // 커넥터 그리기 (잠시 후 실행하여 좌표 확보)
      setTimeout(() => drawConnectors(rounds), 100);
    }

    function renderNode(team, isWinner, isLoser, match, resVal) {
      if (!team) return `<div class="team-node italic opacity-30 text-[10px] justify-center">대기 중</div>`;
      const opponent = resVal === 'win1' ? match.team2 : match.team1;
      const canClick = !!opponent;
      const clickHandler = canClick ? `onclick="setResult('${match.id}', '${match.team1.name}', '${match.team2.name}', '${resVal}')"` : '';
      
      return `
        <div ${clickHandler} class="team-node ${isWinner ? 'winner' : ''} ${isLoser ? 'loser' : ''}">
          <div class="flex items-center gap-2 truncate">
            <div class="w-5 h-5 rounded-full bg-surface-container-highest text-[10px] flex items-center justify-center font-bold">${team.name.charAt(0)}</div>
            <span class="truncate">${team.name}</span>
          </div>
          ${isWinner ? '<span class="material-symbols-outlined text-sm">check_circle</span>' : ''}
        </div>
      `;
    }

    function drawConnectors(rounds) {
      const svg = document.getElementById('bracketConnectors');
      const containerRect = document.getElementById('tournament-graphic').getBoundingClientRect();
      svg.setAttribute('width', document.getElementById('bracketTree').scrollWidth);
      svg.setAttribute('height', document.getElementById('bracketTree').scrollHeight);
      
      for (let r = 0; r < rounds.length - 1; r++) {
        for (let m = 0; m < rounds[r].length; m++) {
          const currentMatch = document.getElementById(`match-${r}-${m}`);
          const nextMatch = document.getElementById(`match-${r+1}-${Math.floor(m/2)}`);
          if (!currentMatch || !nextMatch) continue;

          const startRect = currentMatch.getBoundingClientRect();
          const endRect = nextMatch.getBoundingClientRect();
          
          const startX = startRect.right - containerRect.left + document.getElementById('tournament-graphic').scrollLeft;
          const startY = startRect.top + startRect.height / 2 - containerRect.top + document.getElementById('tournament-graphic').scrollTop;
          
          const endX = endRect.left - containerRect.left + document.getElementById('tournament-graphic').scrollLeft;
          const endY = endRect.top + (m % 2 === 0 ? endRect.height * 0.25 : endRect.height * 0.75) - containerRect.top + document.getElementById('tournament-graphic').scrollTop;
          
          const midX = startX + (endX - startX) / 2;
          
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const d = `M ${startX} ${startY} H ${midX} V ${endY} H ${endX}`;
          path.setAttribute('d', d);
          path.setAttribute('class', `connector-line ${rounds[r][m].winner ? 'active' : ''}`);
          svg.appendChild(path);
        }
      }
    }

    function setResult(matchId, t1, t2, res) {
      AppState.recordResult(matchId, t1, t2, res);
      renderBracket();
    }

    function renderRanking() {
      const teams = AppState.teams; if (!teams) return;
      const stats = AppState.teamsStats || {};
      const sortedTeams = [...teams].sort((a, b) => (stats[b.name]?.points - stats[a.name]?.points) || (stats[b.name]?.wins - stats[a.name]?.wins) || a.name.localeCompare(b.name));
      const rankingContainer = document.getElementById('rankingContent');
      let html = `<div class="grid grid-cols-[3rem_1fr_2rem_2rem_2rem_3rem] gap-2 px-md py-3 bg-surface-container font-bold text-[10px] text-on-surface-variant uppercase tracking-widest"><span class="text-center">Rank</span><span>Team</span><span class="text-center">W</span><span class="text-center">D</span><span class="text-center">L</span><span class="text-center text-primary">Pts</span></div>`;
      html += sortedTeams.map((team, i) => {
        const s = stats[team.name] || { wins: 0, draws: 0, losses: 0, points: 0 };
        return `<div onclick="showTeamDetails('${team.name}')" class="grid grid-cols-[3rem_1fr_2rem_2rem_2rem_3rem] gap-2 items-center px-md py-4 ${i > 0 ? 'border-t border-outline-variant/50' : ''} hover:bg-black/5 transition-colors cursor-pointer animate-in fade-in slide-in-from-left-4 duration-300" style="animation-delay: ${i * 70}ms">
                  <span class="font-headline-md text-headline-md ${i === 0 ? 'text-primary' : 'text-on-surface-variant'} text-center">${i + 1}</span>
                  <div class="flex items-center gap-sm overflow-hidden"><div class="w-7 h-7 rounded-full bg-${i === 0 ? 'primary' : 'surface-container-high'} flex items-center justify-center font-bold text-[9px] ${i === 0 ? 'text-on-primary' : ''} flex-shrink-0">${team.name.charAt(0)}</div><span class="font-body-md text-on-surface font-bold truncate">${team.name}</span></div>
                  <span class="text-center text-xs">${s.wins}</span><span class="text-center text-xs">${s.draws}</span><span class="text-center text-xs">${s.losses}</span><span class="text-center font-bold text-primary">${s.points}</span>
                </div>`;
      }).join('');
      rankingContainer.innerHTML = html;
    }

    function showTeamDetails(teamName) {
      const team = AppState.teams.find(t => t.name === teamName);
      if (!team) return;
      document.getElementById('modalTeamName').textContent = team.name;
      document.getElementById('modalMemberList').innerHTML = team.members.map(m => `<div class="flex items-center gap-md p-sm bg-surface-container-low rounded-xl"><div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center"><span class="material-symbols-outlined text-[18px] text-on-surface-variant">person</span></div><span class="font-body-md text-on-surface font-medium">${m}</span></div>`).join('');
      document.getElementById('teamModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeTeamModal() { document.getElementById('teamModal').classList.add('hidden'); document.body.style.overflow = ''; }

    // Init Double Elim toggle state
    document.getElementById('doubleElimToggle').checked = isDoubleElim;
    setFormat(currentFormat);
    loadComponent('#bottom-nav-container', '../components/bottom-nav.html');
  </script>
</body>
</html>
