<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 8px 32px rgba(0, 74, 198, 0.08);
        }
        
        .bg-pattern {
            background-color: #f8f9ff;
            background-image: radial-gradient(#d3e4fe 2px, transparent 2px);
            background-size: 32px 32px;
        }

        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 2px #004ac6;
            border-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden bg-pattern">
<!-- Decorative background blobs -->
<div class="absolute top-[-10%] left-[-5%] w-[40vw] h-[40vw] rounded-full bg-surface-container-high opacity-60 blur-3xl -z-10 mix-blend-multiply pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50vw] h-[50vw] rounded-full bg-secondary-fixed opacity-30 blur-3xl -z-10 mix-blend-multiply pointer-events-none"></div>
<main class="w-full max-w-md px-container-margin md:px-0 z-10 relative">
<!-- Login Card -->
<div class="glass-panel rounded-xl p-lg flex flex-col gap-md relative overflow-hidden">
<!-- Header Section -->
<div class="text-center flex flex-col items-center gap-base mb-sm">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container mb-2 shadow-[0_4px_12px_rgba(0,74,198,0.2)]">
<span class="material-symbols-outlined text-[32px]">school</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">키네틱 러닝</h1>
<p class="font-body-md text-body-md text-on-surface-variant">다시 오신 것을 환영합니다! 수업을 시작해 볼까요.</p>
</div>
<!-- Login Form -->
<form aria-label="로그인 폼" class="flex flex-col gap-sm w-full">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">이메일 또는 교사 ID</label>
<div class="relative flex items-center input-focus-ring rounded-lg bg-surface-container-lowest border border-outline-variant overflow-hidden transition-all duration-200 h-touch-target">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant">person</span>
<input class="w-full h-full bg-transparent border-none focus:ring-0 pl-10 pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" placeholder="예: teacher@school.edu" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">비밀번호</label>
<div class="relative flex items-center input-focus-ring rounded-lg bg-surface-container-lowest border border-outline-variant overflow-hidden transition-all duration-200 h-touch-target">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant">lock</span>
<input class="w-full h-full bg-transparent border-none focus:ring-0 pl-10 pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-[-8px]">
<a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">비밀번호를 잊으셨나요?</a>
</div>
<!-- Login Button -->
<button class="w-full h-touch-target bg-primary text-on-primary rounded-lg font-button-text text-button-text flex items-center justify-center gap-xs shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-on-primary-fixed-variant hover:shadow-[0_6px_16px_rgba(0,74,198,0.3)] active:scale-[0.98] transition-all duration-200 mt-sm border-b-[3px] border-[#003896]" type="submit">
<span>로그인</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm w-full my-xs">
<div class="flex-grow h-px bg-outline-variant opacity-50"></div>
<span class="font-label-md text-label-md text-on-surface-variant">또는</span>
<div class="flex-grow h-px bg-outline-variant opacity-50"></div>
</div>
<!-- Social Login -->
<button class="w-full h-touch-target bg-surface-container-lowest text-on-surface border border-outline-variant rounded-lg font-button-text text-button-text flex items-center justify-center gap-sm hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200 shadow-sm border-b-[2px]" type="button">
<img class="w-6 h-6 object-contain" data-alt="A clean, flat vector illustration of the colorful Google 'G' logo icon, isolated against a transparent background, suitable for a light-mode educational web interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOTI_hGuZuXjOfeUFtuD5oNNhyrW2tUIpIknaArUualrzxyAm7vjlMhbIKfo_rMYOi9PxMdgSF9HHHWMu4q7UkixJUBxENDOojxGd58p6zwsl2riUPfSaUuJnz4JjmbumuaGu_MpHw_L_8QJKe7PJQ7PYlZtPiwVKvpOvuKPnETr15DZkmqLOxaFsGXtfeWpO4Lwm6PXkfOMj7gfwG1twzwFxrbrZoTEQz4OG21YuwUje7oKoqmtWBEFehCo1TZEFEWV3fBmJrF_k"/>
<span>Google로 계속하기</span>
</button>
<!-- Sign Up Link -->
<div class="text-center mt-sm">
<p class="font-body-md text-body-md text-on-surface-variant">
                    처음 오셨나요? <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors underline decoration-2 underline-offset-4" href="#">회원가입</a>
</p>
</div>
</div>
</main>
</body></html>
