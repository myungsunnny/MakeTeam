<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>대시보드 - 키네틱 러닝</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../js/tailwind.config.js"></script>
  <link rel="stylesheet" href="../css/global.css"/>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md pb-16">

  <!-- 상단 앱바 -->
  <header class="bg-surface w-full top-0 sticky shadow-[0_4px_12px_rgba(0,74,198,0.1)] z-40">
    <div class="flex justify-between items-center h-16 px-container-margin w-full max-w-7xl mx-auto">
      <button class="flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-surface-container-low transition-colors active:scale-95 text-on-surface-variant">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <h1 class="font-headline-md text-headline-md text-primary font-bold">4학년 호랑이반</h1>
      <button class="flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-surface-container-low transition-colors">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDu4RrmCe73gG72ZaIR-_49CumxLA5nHrVpb6fxeOzcU6fn_fgBBQXwD9ySQmxju3do8zUVABeQVq1hbjtM70nsFvWvh22acTnDqaunbAmQN6lOHQCLaDY3eelUH0iLvhcOvZb5RG2OtN-prAJiJeGVHnXuR1MZHIRJLKEUnmlhx8O2PzALkSEIuinpAERjQ6gg8prQ-rVixGo5ZoUscL6YCz5JSakqYrDGPbgsCwahmqn7qObG_PngdueCkJciukM-BjkwOWAMp30"
          alt="프로필" class="w-10 h-10 rounded-full object-cover border-2 border-surface-container-high"/>
      </button>
    </div>
  </header>

  <!-- 메인 -->
  <main class="flex-grow px-container-margin py-lg max-w-lg mx-auto w-full">

    <!-- 페이지 제목 -->
    <div class="mb-lg">
      <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-bold">4학년 호랑이반</h2>
      <p class="font-body-md text-body-md text-on-surface-variant mt-xs">대시보드 요약</p>
    </div>

    <!-- 통계 카드 -->
    <div class="flex flex-col gap-md mb-lg">

      <!-- 총 학생 수 -->
      <div onclick="navigate('studentManagement')"
        class="bg-surface-container-lowest rounded-xl p-lg border border-outline-variant shadow-[0_4px_12px_rgba(0,74,198,0.05)] flex flex-col items-center gap-sm bento-hover cursor-pointer">
        <div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-[28px] text-on-primary fill">groups</span>
        </div>
        <p class="font-body-md text-body-md text-on-surface-variant">총 학생 수</p>
        <p class="font-headline-xl text-headline-xl text-primary font-bold" id="totalStudents">0</p>
      </div>
    </div>

    <!-- 액션 버튼 -->
    <div class="flex flex-col gap-sm mb-lg">
      <button id="teamSetupBtn" onclick="handleTeamAction()"
        class="w-full h-touch-target bg-primary text-on-primary rounded-full font-button-text text-button-text flex items-center justify-center gap-sm shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-200 border-b-[3px] border-[#003896]">
        <span class="material-symbols-outlined text-[20px]" id="teamIcon">add_circle</span>
        <span id="teamBtnText">새로운 팀 생성하기</span>
      </button>
      <button onclick="navigate('matchFormat')"
        class="w-full h-touch-target bg-secondary-container text-on-secondary-container rounded-full font-button-text text-button-text flex items-center justify-center gap-sm shadow-[0_4px_12px_rgba(115,92,0,0.15)] hover:opacity-90 active:scale-[0.98] transition-all duration-200 border-b-[3px] border-[#574500]">
        <span class="material-symbols-outlined text-[20px]">sports_esports</span>
        매치 구성하기
      </button>
    </div>

    <!-- 최근 활동 -->
    <section>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-md">최근 활동</h3>
      <div id="activityList" class="flex flex-col gap-sm">
        <!-- JS로 동적 생성 -->
      </div>
    </section>
  </main>

  <!-- 하단 탭바 -->
  <div id="bottom-nav-container"></div>

  <script src="../js/app.js"></script>
  <script>
    loadComponent('#bottom-nav-container', '../components/bottom-nav.html');
    
    // 상태 반영
    const totalStudentsEl = document.getElementById('totalStudents');
    const teamBtnText = document.getElementById('teamBtnText');
    const teamIcon = document.getElementById('teamIcon');
    const activityListEl = document.getElementById('activityList');

    if (AppState.classroom && AppState.classroom.students) {
      totalStudentsEl.textContent = AppState.classroom.students.length;
    }

    if (AppState.teams && AppState.teams.length > 0) {
      teamBtnText.textContent = '배정된 팀 확인하기';
      teamIcon.textContent = 'visibility';
    }

    // 활동 내역 렌더링
    function renderActivities() {
      const activities = AppState.activities || [];
      if (activities.length === 0) {
        activityListEl.innerHTML = `
          <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-lg flex flex-col items-center gap-sm text-center shadow-[0_4px_12px_rgba(0,74,198,0.05)]">
            <span class="material-symbols-outlined text-[40px] text-outline-variant">history</span>
            <p class="font-body-md text-body-md text-on-surface-variant">최근 활동 내역이 없습니다.</p>
          </div>
        `;
        return;
      }

      activityListEl.innerHTML = activities.map(act => `
        <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-md flex items-center gap-md shadow-[0_2px_8px_rgba(0,0,0,0.04)] animate-in fade-in slide-in-from-bottom-2 duration-300">
          <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-primary text-[20px]">${act.icon}</span>
          </div>
          <div class="flex-grow">
            <p class="font-body-md text-on-surface font-medium">${act.message}</p>
            <p class="text-[11px] text-on-surface-variant">${formatTime(act.time)}</p>
          </div>
        </div>
      `).join('');
    }

    function formatTime(isoStr) {
      const date = new Date(isoStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      
      if (diffMin < 1) return '방금 전';
      if (diffMin < 60) return `${diffMin}분 전`;
      if (diffMin < 1440) return `${Math.floor(diffMin / 60)}시간 전`;
      return date.toLocaleDateString();
    }

    function handleTeamAction() {
      if (AppState.teams && AppState.teams.length > 0) {
        navigate('teamResult');
      } else {
        navigate('teamSetup');
      }
    }

    renderActivities();
  </script>
</body>
</html>
